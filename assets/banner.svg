      .red  { fill: #ff4444; }
      .yel  { fill: #ffcc00; }
      .wht  { fill: #bbffbb; }
      .blu  { fill: #55aaff; }

      /* Sequential line-by-line reveal */
      .r01{animation:pop .08s 0.10s both}
      .r02{animation:pop .08s 0.30s both}
      .r03{animation:pop .08s 0.55s both}
      .r04{animation:pop .08s 0.80s both}
      .r05{animation:pop .08s 1.00s both}
      .r06{animation:pop .08s 1.25s both}
      .r07{animation:pop .08s 1.50s both}
      .r08{animation:pop .08s 1.75s both}
      .r09{animation:pop .08s 2.00s both}
      .r10{animation:pop .08s 2.25s both}
      .r11{animation:pop .08s 2.50s both}
      .r12{animation:pop .08s 2.75s both}
      .r13{animation:pop .08s 3.00s both}
      .r14{animation:pop .08s 3.25s both}
      .r15{animation:pop .08s 3.50s both}
      .r16{animation:pop .08s 3.75s both}
      .r17{animation:pop .08s 4.00s both}
      .r18{animation:pop .08s 4.25s both}
      .r19{animation:pop .08s 4.50s both}
      .r20{animation:pop .08s 4.75s both}
      .r21{animation:pop .08s 5.00s both}
      .r22{animation:pop .08s 5.25s both}
      .r23{animation:pop .08s 5.50s both}
      .r24{animation:pop .08s 5.75s both}

      @keyframes pop {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .cursor {
        fill: #00ff41;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,100%{ opacity:1; } 50%{ opacity:0; }
      }

      .title-pulse {
        animation: pulse 2.8s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        from { filter: drop-shadow(0 0 4px #00ff41) drop-shadow(0 0 8px #00aa20); }
        to   { filter: drop-shadow(0 0 16px #00ff41) drop-shadow(0 0 32px #00cc30) drop-shadow(0 0 60px #007010); }
      }

      /* bar animations */
      .b1{animation:fillbar 1.4s 1.5s ease-out both; transform-origin:556px center;}
      .b2{animation:fillbar 1.4s 1.8s ease-out both; transform-origin:556px center;}
      .b3{animation:fillbar 1.4s 2.1s ease-out both; transform-origin:556px center;}
      .b4{animation:fillbar 1.4s 2.4s ease-out both; transform-origin:556px center;}
      .b5{animation:fillbar 1.4s 2.7s ease-out both; transform-origin:556px center;}
      @keyframes fillbar {
        from{ transform:scaleX(0); }
        to  { transform:scaleX(1); }
      }

      /* CRT flicker */
      .crt { animation: crt 12s linear infinite; }
      @keyframes crt {
        0%,89%,100%{ opacity:.055; }
        90%        { opacity:.14;  }
        91%        { opacity:.055; }
        95%        { opacity:.10;  }
        96%        { opacity:.055; }
      }
    </style>

