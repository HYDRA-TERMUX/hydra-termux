<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <style>
      .mono { font-family: 'Courier New', 'Lucida Console', monospace; }
      .g1 { fill: #00ff41; }
      .g2 { fill: #00cc33; }
      .g3 { fill: #009922; }
      .dim { fill: #005511; }
      .red { fill: #ff3333; }
      .yel { fill: #ffcc00; }
      .wht { fill: #ccffcc; }
      .blu { fill: #44aaff; }

      /* line-by-line appear */
      .l01{animation:appear .1s  0.10s both}
      .l02{animation:appear .1s  0.35s both}
      .l03{animation:appear .1s  0.55s both}
      .l04{animation:appear .1s  0.80s both}
      .l05{animation:appear .1s  1.05s both}
      .l06{animation:appear .1s  1.30s both}
      .l07{animation:appear .1s  1.55s both}
      .l08{animation:appear .1s  1.80s both}
      .l09{animation:appear .1s  2.10s both}
      .l10{animation:appear .1s  2.35s both}
      .l11{animation:appear .1s  2.60s both}
      .l12{animation:appear .1s  2.90s both}
      .l13{animation:appear .1s  3.15s both}
      .l14{animation:appear .1s  3.45s both}
      .l15{animation:appear .1s  3.75s both}
      .l16{animation:appear .1s  4.00s both}
      .l17{animation:appear .1s  4.30s both}
      .l18{animation:appear .1s  4.55s both}
      .l19{animation:appear .1s  4.80s both}
      .l20{animation:appear .1s  5.10s both}

      @keyframes appear {
        from { opacity:0; }
        to   { opacity:1; }
      }

      .blink {
        animation: blink 1s step-end infinite;
        fill: #00ff41;
      }
      @keyframes blink {
        0%,100%{ opacity:1; }
        50%    { opacity:0; }
      }

      .glow-title {
        animation: glow 2.5s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from { filter: drop-shadow(0 0 3px #00ff41); }
        to   { filter: drop-shadow(0 0 18px #00ff41) drop-shadow(0 0 40px #00aa20); }
      }

      /* progress bar fill left→right */
      .bar1 { animation: bar1 1.2s 2.0s ease-out both; transform-origin:left center; }
      .bar2 { animation: bar1 1.2s 2.3s ease-out both; transform-origin:left center; }
      .bar3 { animation: bar1 1.2s 2.6s ease-out both; transform-origin:left center; }
      .bar4 { animation: bar1 1.2s 2.9s ease-out both; transform-origin:left center; }
      .bar5 { animation: bar1 1.2s 3.2s ease-out both; transform-origin:left center; }
      @keyframes bar1 {
        from { transform:scaleX(0); }
        to   { transform:scaleX(1); }
      }

      /* CRT scanline flicker */
      .scanlines {
        animation: flicker 8s linear infinite;
      }
      @keyframes flicker {
        0%,100%{ opacity:0.07; }
        92%    { opacity:0.07; }
        93%    { opacity:0.13; }
        94%    { opacity:0.07; }
        96%    { opacity:0.10; }
        97%    { opacity:0.07; }
      }
    </style>

    <!-- dark green gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010e01"/>
      <stop offset="100%" stop-color="#000600"/>
    </linearGradient>

    <!-- scanline pattern -->
    <pattern id="scan" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="900" height="1" fill="#00ff41" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- CRT scanlines -->
  <rect width="900" height="320" fill="url(#scan)" class="scanlines"/>

  <!-- outer border glow -->
